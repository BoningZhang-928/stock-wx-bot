name: StockWxBot

# 定时规则：A股工作日
# 北京时间 09:35 / 11:30 / 15:30 自动执行
on:
  schedule:
    - cron: '35 1 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 支持手动点按钮立即运行

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行股票推送
        run: python stock_bot.py
